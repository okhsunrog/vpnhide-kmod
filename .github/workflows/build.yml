name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        gki:
          - branch: android14-6.1
            symvers: symvers/android14-6.1.symvers
          # Add more generations here as symvers files are committed:
          # - branch: android13-5.15
          #   symvers: symvers/android13-5.15.symvers
          # - branch: android15-6.6
          #   symvers: symvers/android15-6.6.symvers

    steps:
      - name: Checkout vpnhide-kmod
        uses: actions/checkout@v4

      - name: Cache kernel source
        uses: actions/cache@v4
        id: kernel-cache
        with:
          path: kernel-source
          key: kernel-${{ matrix.gki.branch }}

      - name: Clone kernel source (shallow)
        if: steps.kernel-cache.outputs.cache-hit != 'true'
        run: |
          git clone --depth=1 -b ${{ matrix.gki.branch }} \
              https://android.googlesource.com/kernel/common \
              kernel-source

      - name: Cache clang toolchain
        uses: actions/cache@v4
        id: clang-cache
        with:
          path: android-clang
          key: android-clang-r487747c

      - name: Download Android clang toolchain
        if: steps.clang-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p android-clang
          # Use the prebuilt clang from Google's CI artifacts
          CLANG_URL="https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r487747c.tar.gz"
          curl -L "$CLANG_URL" | tar xz -C android-clang 2>/dev/null || {
            # Fallback: build with system clang + cross-compile target
            echo "Prebuilt clang download failed, trying AOSP mirror..."
            # Clone just the clang directory
            git clone --depth=1 --filter=blob:none --sparse \
                https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86 \
                android-clang-repo
            cd android-clang-repo && git sparse-checkout set clang-r487747c
            mv clang-r487747c/* ../android-clang/ 2>/dev/null || true
            cd .. && rm -rf android-clang-repo
          }
          # Verify clang exists
          ls android-clang/bin/clang

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends bc kmod

      - name: Prepare kernel source
        run: |
          KSRC=$GITHUB_WORKSPACE/kernel-source
          CLANG=$GITHUB_WORKSPACE/android-clang/bin

          cd "$KSRC"

          # Use GKI defconfig
          make ARCH=arm64 LLVM=1 LLVM_IAS=1 \
              CC=$CLANG/clang LD=$CLANG/ld.lld AR=$CLANG/llvm-ar \
              NM=$CLANG/llvm-nm OBJCOPY=$CLANG/llvm-objcopy \
              OBJDUMP=$CLANG/llvm-objdump STRIP=$CLANG/llvm-strip \
              CROSS_COMPILE=aarch64-linux-gnu- \
              gki_defconfig

          # Create empty ABI symbol list
          touch abi_symbollist.raw

          # Prepare headers (ignore resolve_btfids failure)
          make ARCH=arm64 LLVM=1 LLVM_IAS=1 \
              CC=$CLANG/clang LD=$CLANG/ld.lld AR=$CLANG/llvm-ar \
              NM=$CLANG/llvm-nm OBJCOPY=$CLANG/llvm-objcopy \
              OBJDUMP=$CLANG/llvm-objdump STRIP=$CLANG/llvm-strip \
              CROSS_COMPILE=aarch64-linux-gnu- \
              olddefconfig prepare || true

          # Generate module.lds
          $CLANG/clang -E -Wp,-MD,scripts/.module.lds.d -nostdinc \
              -I arch/arm64/include -I arch/arm64/include/generated \
              -I include -I include/generated \
              -include include/linux/kconfig.h \
              -D__KERNEL__ -DCC_USING_PATCHABLE_FUNCTION_ENTRY \
              --target=aarch64-linux-gnu -x c scripts/module.lds.S \
              2>/dev/null | grep -v '^#' > scripts/module.lds
          sed -i 's/((1UL) << 12)/4096/g' scripts/module.lds

          # Copy Module.symvers from committed file
          cp "$GITHUB_WORKSPACE/${{ matrix.gki.symvers }}" Module.symvers

          # Set placeholder vermagic (KernelSU bypasses check)
          PLACEHOLDER="6.1.999-placeholder-$(printf 'x%.0s' $(seq 1 100))"
          echo "#define UTS_RELEASE \"$PLACEHOLDER\"" \
              > include/generated/utsrelease.h
          echo -n "$PLACEHOLDER" > include/config/kernel.release

      - name: Build kernel module
        run: |
          KSRC=$GITHUB_WORKSPACE/kernel-source
          CLANG=$GITHUB_WORKSPACE/android-clang/bin

          make -C "$KSRC" M=$GITHUB_WORKSPACE \
              ARCH=arm64 LLVM=1 LLVM_IAS=1 \
              CC=$CLANG/clang LD=$CLANG/ld.lld \
              AR=$CLANG/llvm-ar NM=$CLANG/llvm-nm \
              OBJCOPY=$CLANG/llvm-objcopy \
              OBJDUMP=$CLANG/llvm-objdump \
              STRIP=$CLANG/llvm-strip \
              CROSS_COMPILE=aarch64-linux-gnu- \
              modules

          ls -lh vpnhide_kmod.ko

      - name: Package KSU module zip
        run: |
          cp vpnhide_kmod.ko module/
          ZIPNAME="vpnhide-kmod-${{ matrix.gki.branch }}.zip"
          (cd module && zip -qr "../$ZIPNAME" .)
          ls -lh "$ZIPNAME"
          echo "zipname=$ZIPNAME" >> "$GITHUB_OUTPUT"
        id: package

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vpnhide-kmod-${{ matrix.gki.branch }}
          path: vpnhide-kmod-${{ matrix.gki.branch }}.zip
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          for f in *.zip; do sha256sum "$f" > "${f}.sha256"; done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          files: |
            dist/*.zip
            dist/*.sha256
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
